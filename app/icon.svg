    <line x1="-22" y1="-22" x2="-16" y2="0"/>
    <line x1="-16" y1="-22" x2="-11" y2="0"/>
    <line x1="-10" y1="-22" x2="-6" y2="0"/>
    <line x1="-4" y1="-22" x2="-1" y2="0"/>
    <line x1="4" y1="-22" x2="1" y2="0"/>
    <line x1="10" y1="-22" x2="6" y2="0"/>
    <line x1="16" y1="-22" x2="11" y2="0"/>
    <line x1="22" y1="-22" x2="16" y2="0"/>
    <line x1="-25" y1="-16" x2="25" y2="-16"/>
    <line x1="-25" y1="-10" x2="25" y2="-10"/>
